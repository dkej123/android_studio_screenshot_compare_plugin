name: Verify Plugin

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify compatibility
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify plugin
        run: ./gradlew verifyPlugin --stacktrace
